type: object
description: >
  Запис характеристики. Якщо pid == null — це сама характеристика;
  якщо pid != null — значення характеристики (pid вказує на батьківську).
required:
  - id
  - pid
  - keyStr
  - name
properties:
  id:
    type: integer
  pid:
    type:
      - integer
      - "null"
  keyStr:
    type: string
  name:
    anyOf:
      - $ref: ./dictionaries.LocaleName.yaml
      - type: "null"
